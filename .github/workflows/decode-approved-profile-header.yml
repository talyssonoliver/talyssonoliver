name: Decode approved profile header

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  decode:
    if: github.event.issue.title == 'Finalize approved profile header PNG'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the prepared header branch
        uses: actions/checkout@v4
        with:
          ref: fix/publish-real-header-png-final
          fetch-depth: 0

      - name: Convert stored payload into the real PNG
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64

          image_path = Path('assets/profile-header.png')
          payload = image_path.read_text(encoding='utf-8').strip()
          image = base64.b64decode(payload, validate=True)
          if not image.startswith(b'\x89PNG\r\n\x1a\n'):
              raise SystemExit('Decoded asset is not a valid PNG')
          image_path.write_bytes(image)

          readme_path = Path('README.md')
          readme = readme_path.read_text(encoding='utf-8')
          old = './assets/profile-header-aurora-v2.svg'
          new = './assets/profile-header.png'
          if old not in readme:
              raise SystemExit('Expected current header reference was not found')
          readme_path.write_text(readme.replace(old, new, 1), encoding='utf-8')

          stale_workflow = Path('.github/workflows/finalize-profile-header.yml')
          if stale_workflow.exists():
              stale_workflow.unlink()
          PY

      - name: Commit the clean PNG result
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: publish approved profile header PNG"
          git push origin HEAD:fix/publish-real-header-png-final
