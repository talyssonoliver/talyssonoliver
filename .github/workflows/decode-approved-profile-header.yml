name: Decode approved profile header

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  decode:
    if: >-
      github.event.pull_request.title == 'fix: publish approved profile header PNG' &&
      github.event.pull_request.head.ref == 'fix/publish-real-header-png-final'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the prepared header branch
        uses: actions/checkout@v4
        with:
          ref: fix/publish-real-header-png-final
          fetch-depth: 0

      - name: Convert stored payload into the real PNG
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64

          png_signature = b'\x89PNG\r\n\x1a\n'
          image_path = Path('assets/profile-header.png')
          source = image_path.read_bytes()

          if source.startswith(png_signature):
              image = source
          else:
              payload = b''.join(source.split())
              payload += b'=' * (-len(payload) % 4)
              image = base64.b64decode(payload, validate=False)

          print(f'payload bytes={len(source)} decoded bytes={len(image)} prefix={image[:8]!r}')
          if not image.startswith(png_signature):
              raise SystemExit('Decoded asset is not a valid PNG')
          image_path.write_bytes(image)

          readme_path = Path('README.md')
          readme = readme_path.read_text(encoding='utf-8')
          old = './assets/profile-header-aurora-v2.svg'
          new = './assets/profile-header.png'
          if old in readme:
              readme = readme.replace(old, new, 1)
          elif new not in readme:
              raise SystemExit('No recognised profile-header reference was found')
          readme_path.write_text(readme, encoding='utf-8')

          for stale in (
              Path('.github/workflows/finalize-profile-header.yml'),
              Path('.profile-header-retry'),
          ):
              if stale.exists():
                  stale.unlink()
          PY

      - name: Commit the clean PNG result
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No branch changes required"
            exit 0
          fi
          git commit -m "fix: publish approved profile header PNG"
          git push origin HEAD:fix/publish-real-header-png-final
