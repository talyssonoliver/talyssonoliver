name: Publish verified RGB profile header

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  publish:
    if: >-
      github.event.pull_request.title == 'fix: publish RGB profile header' &&
      github.event.pull_request.head.ref == 'fix/profile-header-rgb-v3'
    runs-on: ubuntu-latest
    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: fix/profile-header-rgb-v3
          fetch-depth: 0

      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check pillow

      - name: Assemble verified artwork and write RGB PNG
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import hashlib
          import shutil
          from PIL import Image

          payload_dir = Path('.profile-header-payload')
          ready = payload_dir / 'READY'
          if not ready.exists():
              print('Payload is not complete yet; nothing to publish.')
              raise SystemExit(0)

          parts = sorted(payload_dir.glob('part-*.b64'))
          if len(parts) != 8:
              raise SystemExit(f'Expected 8 payload parts, found {len(parts)}')

          payload = ''.join(part.read_text(encoding='ascii').strip() for part in parts)
          source_bytes = base64.b64decode(payload, validate=True)

          expected_sha256 = 'ea8ab6f9639b886f0f8280dbb0976aca51448f688dbbd3995a76618b17152a73'
          actual_sha256 = hashlib.sha256(source_bytes).hexdigest()
          if actual_sha256 != expected_sha256:
              raise SystemExit(f'SHA-256 mismatch: {actual_sha256}')

          source_path = payload_dir / 'source.jpg'
          source_path.write_bytes(source_bytes)
          target = Path('assets/profile-header-rgb-v4.png')

          with Image.open(source_path) as image:
              image.load()
              if image.size != (900, 300):
                  raise SystemExit(f'Unexpected source size: {image.size}')
              rgb = image.convert('RGB')
              rgb.save(target, format='PNG', optimize=True, compress_level=9)

          with Image.open(target) as check:
              check.load()
              if check.mode != 'RGB' or check.size != (900, 300):
                  raise SystemExit(
                      f'Unexpected output: mode={check.mode} size={check.size}'
                  )

          readme_path = Path('README.md')
          lines = readme_path.read_text(encoding='utf-8').splitlines()
          alt = 'Talysson Oliveira — Full-stack product engineer in London'
          replacement = f'![{alt}](./assets/profile-header-rgb-v4.png)'
          if not lines or 'profile-header' not in lines[0]:
              raise SystemExit('Unexpected README header line')
          lines[0] = replacement
          readme_path.write_text('\n'.join(lines) + '\n', encoding='utf-8')

          shutil.rmtree(payload_dir)
          print(
              f'Published {target}: 900x300 RGB; '
              f'source sha256={actual_sha256}; output bytes={target.stat().st_size}'
          )
          PY

      - name: Commit verified asset
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes required"
            exit 0
          fi
          git commit -m "fix: publish verified RGB profile header"
          git push origin HEAD:fix/profile-header-rgb-v3
