name: Re-encode profile header as RGB PNG

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  reencode:
    if: >-
      github.event.pull_request.title == 'fix: publish RGB profile header' &&
      github.event.pull_request.head.ref == 'fix/profile-header-rgb-v3'
    runs-on: ubuntu-latest
    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: fix/profile-header-rgb-v3
          fetch-depth: 0

      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check pillow

      - name: Re-encode existing artwork as true-colour PNG
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image

          source = Path('assets/profile-header.png')
          target = Path('assets/profile-header-rgb-v3.png')

          with Image.open(source) as image:
              rgb = image.convert('RGB')
              rgb.save(target, format='PNG', optimize=True, compress_level=9)

          with Image.open(target) as check:
              if check.mode != 'RGB':
                  raise SystemExit(f'Unexpected output mode: {check.mode}')
              if check.size != (900, 300):
                  raise SystemExit(f'Unexpected output size: {check.size}')
              print(f'output mode={check.mode} size={check.size} bytes={target.stat().st_size}')

          readme_path = Path('README.md')
          readme = readme_path.read_text(encoding='utf-8')
          lines = readme.splitlines()
          expected_alt = 'Talysson Oliveira — Full-stack product engineer in London'
          replacement = f'![{expected_alt}](./assets/profile-header-rgb-v3.png)'

          if not lines:
              raise SystemExit('README is empty')
          if 'profile-header' not in lines[0]:
              raise SystemExit(f'Unexpected first README line: {lines[0]!r}')
          lines[0] = replacement
          readme_path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

      - name: Commit converted asset
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/profile-header-rgb-v3.png
          if git diff --cached --quiet; then
            echo "No changes required"
            exit 0
          fi
          git commit -m "fix: publish RGB profile header"
          git push origin HEAD:fix/profile-header-rgb-v3
