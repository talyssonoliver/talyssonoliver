<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Talysson Oliveira — Full-stack product engineer</title>
  <desc id="desc">A dark blue and violet profile banner with Talysson Oliveira's name and the phrase software that still makes sense after the next ten features.</desc>
  <defs>
    <linearGradient id="bg" x1="40" y1="0" x2="1160" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="0.48" stop-color="#11182B"/>
      <stop offset="1" stop-color="#171126"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="250" x2="1010" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.52" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 60) rotate(38) scale(330 220)">
      <stop stop-color="#38BDF8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1040 270) rotate(-145) scale(390 230)">
      <stop stop-color="#A855F7" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#FFFFFF" stroke-opacity="0.055"/>
    </pattern>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="28" fill="url(#grid)"/>
  <rect width="1200" height="320" rx="28" fill="url(#glowBlue)"/>
  <rect width="1200" height="320" rx="28" fill="url(#glowViolet)"/>

  <circle cx="1030" cy="74" r="82" fill="#6366F1" fill-opacity="0.12" filter="url(#blur)"/>
  <circle cx="1130" cy="226" r="96" fill="#A855F7" fill-opacity="0.11" filter="url(#blur)"/>

  <path d="M760 264C866 217 907 129 1018 101C1067 88 1116 91 1160 107" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" stroke-opacity="0.95"/>
  <path d="M794 284C888 251 951 190 1040 167C1084 156 1124 158 1168 174" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4"/>

  <rect x="72" y="58" width="116" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.12"/>
  <text x="130" y="78" text-anchor="middle" fill="#C9D1D9" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="600" letter-spacing="1.6">LONDON · UK</text>

  <text x="72" y="154" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="58" font-weight="720" letter-spacing="-1.8">Talysson Oliveira</text>
  <text x="74" y="198" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="520">Full-stack product engineer</text>
  <text x="74" y="244" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="420">Software that still makes sense after the next ten features.</text>

  <rect x="72" y="274" width="286" height="3" rx="1.5" fill="url(#accent)"/>
</svg>
